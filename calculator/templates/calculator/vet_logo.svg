<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17b978;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#118a59;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background Shield -->
  <path d="M256,40 C370,40 430,90 430,220 C430,340 330,420 256,472 C182,420 82,340 82,220 C82,90 142,40 256,40 Z" fill="url(#grad)" filter="url(#shadow)"/>
  <!-- Inner Paw Print with cross inside pad -->
  <g fill="#ffffff">
    <!-- Top left toe -->
    <ellipse cx="180" cy="180" rx="30" ry="40" transform="rotate(-15 180 180)" />
    <!-- Top mid-left toe -->
    <ellipse cx="230" cy="140" rx="30" ry="45" transform="rotate(-5 230 140)" />
    <!-- Top mid-right toe -->
    <ellipse cx="282" cy="140" rx="30" ry="45" transform="rotate(5 282 140)" />
    <!-- Top right toe -->
    <ellipse cx="332" cy="180" rx="30" ry="40" transform="rotate(15 332 180)" />
    <!-- Main pad -->
    <path d="M176,280 C166,240 216,210 256,210 C296,210 346,240 336,280 C326,320 286,330 256,330 C226,330 186,320 176,280 Z" />
  </g>
  <!-- Medical Cross on main pad -->
  <path d="M241,245 H271 V275 H301 V305 H271 V335 H241 V305 H211 V275 H241 Z" fill="#17b978" transform="scale(0.6) translate(170, 110)"/>
</svg>
